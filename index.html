<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Le Cénacle — Candidature</title>
  <meta name="description" content="Pour les artistes qui formulent une vision. Le Cénacle accompagne ceux qui veulent structurer leur pensée, affirmer leur voix et bâtir un héritage.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Hero -->
  <header class="hero" style="background-image: url('assets/hero.webp');">
    <img src="assets/cénacle-logo.svg" alt="Le Cénacle" class="logo">
    <h1>Le Cénacle</h1>
    <div class="divider"></div>
  </header>

  <!-- Funnel sections -->
  <section class="funnel">

    <div class="funnel-block funnel-block--left">
      <div class="funnel-img funnel-img--large">
        <video src="assets/video-1.mp4" autoplay muted loop playsinline disablepictureinpicture></video>
      </div>
      <div class="funnel-text">
        <p class="typewriter" data-text="Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua."></p>
      </div>
    </div>

    <div class="funnel-block funnel-block--right">
      <div class="funnel-img funnel-img--medium">
        <video src="assets/video-2.mp4" autoplay muted loop playsinline disablepictureinpicture></video>
      </div>
      <div class="funnel-text">
        <p class="typewriter" data-text="Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat."></p>
      </div>
    </div>

    <div class="funnel-block funnel-block--left">
      <div class="funnel-img funnel-img--small">
        <video src="assets/video-3.mp4" autoplay muted loop playsinline disablepictureinpicture></video>
      </div>
      <div class="funnel-text">
        <p class="typewriter" data-text="Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur."></p>
      </div>
    </div>

  </section>

  <!-- CTA -->
  <section class="cta-section">
    <p class="cta-lead">Pour les artistes qui formulent une vision — culturelle, sociétale, singulière.</p>
    <a href="form.html" class="btn">Postuler</a>
  </section>

  <script src="main.js"></script>
</body>
</html>
